        @keyframes crossPing {
            0% { transform: scale(0.5); opacity: 1; }
            100% { transform: scale(3); opacity: 0; }
        }
        .animate-cross { animation: crossPing 0.6s cubic-bezier(0, 0, 0.2, 1) forwards; }

        const { useState, useEffect } = React;

        const CrossClickEffect = () => {
            const [clicks, setClicks] = useState([]);
            useEffect(() => {
                const handleGlobalClick = (e) => {
                    const id = Date.now() + Math.random();
                    setClicks(prev => [...prev, { x: e.clientX, y: e.clientY, id }]);
                    setTimeout(() => {
                        setClicks(prev => prev.filter(c => c.id !== id));
                    }, 600);
                };
                window.addEventListener('click', handleGlobalClick);
                return () => window.removeEventListener('click', handleGlobalClick);
            }, []);

            return (
                <>
                    {clicks.map(click => (
                        <div key={click.id} className="fixed pointer-events-none z-[9999] animate-cross" style={{ left: click.x, top: click.y }}>
                            <div className="absolute w-0.5 h-6 bg-red-600 -translate-x-1/2 -translate-y-1/2 shadow-[0_0_8px_red]"></div>
                            <div className="absolute w-6 h-0.5 bg-red-600 -translate-x-1/2 -translate-y-1/2 shadow-[0_0_8px_red]"></div>
